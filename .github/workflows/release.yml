name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish built Python artifacts to TestPyPI"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-python:
    name: Build Python Packages
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Read package version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          from pathlib import Path
          namespace = {}
          exec(Path("src/gh_audit/__about__.py").read_text(), namespace)
          print(namespace["__version__"])
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.version }}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${EXPECTED_TAG}" >&2
            exit 1
          fi

      - name: Install build tools
        run: pip install hatch

      - name: Build wheel and sdist
        run: hatch build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          retention-days: 14

  build-binaries:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-15]
        include:
          - os: ubuntu-latest
            artifact_name: gh-audit-linux-amd64
          - os: windows-latest
            artifact_name: gh-audit-windows-amd64
          - os: macos-13
            artifact_name: gh-audit-macos-amd64
          - os: macos-15
            artifact_name: gh-audit-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: pip install -e ".[build]"

      - name: Build standalone executable
        run: python scripts/build-gh-audit.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/gh-audit*
          retention-days: 14

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build-python]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_testpypi
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/project/gh-audit/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-python]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/gh-audit/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  bundle-artifacts:
    name: Bundle Release Artifacts
    runs-on: ubuntu-latest
    needs: [build-python, build-binaries]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gh-audit-*
          merge-multiple: false

      - name: Create zipped binary assets
        run: |
          mkdir -p release
          cp dist/* release/
          for dir in artifacts/gh-audit-*; do
            platform=$(basename "$dir")
            if [[ -f "$dir/gh-audit.exe" ]]; then
              (cd "$dir" && zip "../../release/${platform}.zip" gh-audit.exe)
            else
              (cd "$dir" && zip "../../release/${platform}.zip" gh-audit)
            fi
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Verify packaged assets
        run: |
          for zip_path in release/gh-audit-*.zip; do
            zip_name=$(basename "$zip_path")
            echo "Verifying $zip_name"
            unzip -l "$zip_path"
            if [[ "$zip_name" == *windows* ]]; then
              unzip -l "$zip_path" | grep -q "gh-audit.exe"
            else
              unzip -l "$zip_path" | grep -q "gh-audit$"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release/*
          retention-days: 14

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python, bundle-artifacts, publish-pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-python.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "gh-audit ${VERSION}" \
              --generate-notes \
              release/*
          fi

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [build-python, create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-python.outputs.version }}
        run: |
          mkdir -p assets
          for platform in linux-amd64 macos-amd64 macos-arm64; do
            gh release download "v${VERSION}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "gh-audit-${platform}.zip" \
              --dir assets/
          done

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "linux_amd64=$(sha256sum assets/gh-audit-linux-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_amd64=$(sha256sum assets/gh-audit-macos-amd64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_arm64=$(sha256sum assets/gh-audit-macos-arm64.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: n8group-oss/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        env:
          VERSION: ${{ needs.build-python.outputs.version }}
          REPO: ${{ github.repository }}
          SHA_LINUX: ${{ steps.hashes.outputs.linux_amd64 }}
          SHA_MACOS_AMD64: ${{ steps.hashes.outputs.macos_amd64 }}
          SHA_MACOS_ARM64: ${{ steps.hashes.outputs.macos_arm64 }}
        run: |
          cd homebrew-tap
          rm -f Formula/gh-scanner.rb
          cat > Formula/gh-audit.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class GhAudit < Formula
            desc "GitHub audit, governance, and inventory for organizations"
            homepage "https://n8-group.com"
            version "${VERSION}"
            license "BUSL-1.1"

            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/${REPO}/releases/download/v${VERSION}/gh-audit-macos-arm64.zip"
              sha256 "${SHA_MACOS_ARM64}"
            elsif OS.mac? && Hardware::CPU.intel?
              url "https://github.com/${REPO}/releases/download/v${VERSION}/gh-audit-macos-amd64.zip"
              sha256 "${SHA_MACOS_AMD64}"
            elsif OS.linux?
              url "https://github.com/${REPO}/releases/download/v${VERSION}/gh-audit-linux-amd64.zip"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "gh-audit"
            end

            test do
              system "#{bin}/gh-audit", "--version"
            end
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "gh-audit-bot"
          git config user.email "noreply@n8-group.com"
          git add -A Formula
          git diff --cached --quiet || git commit -m "Update gh-audit to ${{ needs.build-python.outputs.version }}"
          git push

  update-chocolatey:
    name: Update Chocolatey Package
    runs-on: windows-latest
    needs: [build-python, create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-python.outputs.version }}
        shell: pwsh
        run: |
          gh release download "v$env:VERSION" `
            --repo "${{ github.repository }}" `
            --pattern "gh-audit-windows-amd64.zip" `
            --dir assets/

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $hash = (Get-FileHash assets/gh-audit-windows-amd64.zip -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Update install script and nuspec
        shell: pwsh
        run: |
          $version = "${{ needs.build-python.outputs.version }}"
          $sha = "${{ steps.hash.outputs.sha256 }}"

          $install = Get-Content chocolatey/tools/chocolateyInstall.ps1 -Raw
          $install = $install -replace "\`$checksum = '.*?'", "`$checksum = '$sha'"
          Set-Content chocolatey/tools/chocolateyInstall.ps1 $install

          [xml]$nuspec = Get-Content chocolatey/gh-audit.nuspec
          $nuspec.package.metadata.version = $version
          $nuspec.Save("$PWD/chocolatey/gh-audit.nuspec")

      - name: Pack nupkg
        shell: pwsh
        run: |
          choco pack chocolatey/gh-audit.nuspec --output-directory dist/

      - name: Upload nupkg to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-python.outputs.version }}
        shell: bash
        run: |
          gh release upload "v${VERSION}" \
            dist/gh-audit.*.nupkg \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
